name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      USE_E2E_TEST_DATABASE: true
      SUPABASE_DB_NAME: ${{ secrets.SUPABASE_E2E_DB_NAME }}
      SUPABASE_DB_USER: ${{ secrets.SUPABASE_E2E_DB_USER }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_E2E_DB_PASSWORD }}
      SUPABASE_DB_HOST: ${{ secrets.SUPABASE_E2E_DB_HOST }}
      SUPABASE_DB_PORT: ${{ secrets.SUPABASE_E2E_DB_PORT }}
      SECRET_KEY: ${{ secrets.ACTIONS_SECRET_KEY }}
      DEBUG: 'True'
    
    defaults:
      run:
        working-directory: ./myVOD/frontend/myVOD
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install uv
      run: pip install uv
      working-directory: ${{ github.workspace }}
    
    - name: Install Python dependencies
      run: uv sync
      working-directory: ${{ github.workspace }}/myVOD/backend/myVOD
    
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: ./myVOD/frontend/myVOD/playwright-report/
        retention-days: 30