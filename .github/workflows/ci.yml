name: myVOD CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./myVOD

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      run: pip install uv

    - name: Cache uv
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: uv sync --ci

    - name: Lint with ruff
      run: uv run ruff check .

    - name: Test with pytest
      run: uv run pytest

  frontend-ci:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./myVOD/frontend/myVOD

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install dependencies
      run: npm ci

    - name: Lint with ESLint
      run: npm run lint

    - name: Test with Vitest
      run: npm run test:run

    - name: Build project
      run: npm run build
