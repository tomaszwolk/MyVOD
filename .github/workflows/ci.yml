name: myVOD CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: myVOD.settings
      # USE_E2E_TEST_DATABASE is only for E2E tests with Playwright, not for pytest unit tests
      SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
      SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
      SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
      SECRET_KEY: ${{ secrets.ACTIONS_SECRET_KEY }}
      TEST_USER: ${{ secrets.TEST_USER }}
      TEST_USER_2: ${{ secrets.TEST_USER_2 }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      WATCHMODE_API_KEY: ${{ secrets.WATCHMODE_API_KEY }}
    
    defaults:
      run:
        working-directory: ./myVOD/backend/myVOD

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      run: pip install uv

    - name: Cache uv
      uses: actions/cache@v4
      with:
        path: ~/.cache/uv
        key: ${{ runner.os }}-uv-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: uv sync

    - name: Lint with ruff
      run: uv run ruff check .

    - name: Test with pytest
      run: uv run pytest

  frontend-ci:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./myVOD/frontend/myVOD

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache node modules
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install dependencies
      run: npm ci

    - name: Lint with ESLint
      run: npm run lint

    - name: Test with Vitest
      run: npm run test:run

    - name: Build project
      run: npm run build
