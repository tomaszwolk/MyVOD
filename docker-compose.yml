# This docker-compose.yml file uses the modern Compose file format,
# which does not require a top-level 'version' attribute.
#
# IMPORTANT: Before running any docker-compose commands,
# ensure that Docker Desktop is running on your machine.

services:
  backend:
    build:
      context: ./myVOD/backend
    container_name: myvod-backend
    command: gunicorn myVOD.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - ./myVOD/backend/.env
    depends_on:
      - redis

  frontend:
    build:
      context: ./myVOD/frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: myvod-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: myvod-redis
    ports:
      - "6379:6379"

  celery_worker:
    build:
      context: ./myVOD/backend
    container_name: myvod-celery-worker
    command: celery -A myVOD worker -l info
    env_file:
      - ./myVOD/backend/.env
    depends_on:
      - redis
      - backend

  celery_beat:
    build:
      context: ./myVOD/backend
    container_name: myvod-celery-beat
    command: celery -A myVOD beat -l info
    env_file:
      - ./myVOD/backend/.env
    depends_on:
      - redis
      - backend
