version: '3.8'

services:
  backend:
    build:
      context: ./myVOD/backend
    container_name: myvod-backend
    command: gunicorn myVOD.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - ./myVOD/backend/.env
    depends_on:
      - redis

  frontend:
    build:
      context: ./myVOD/frontend
    container_name: myvod-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: myvod-redis
    ports:
      - "6379:6379"

  celery_worker:
    build:
      context: ./myVOD/backend
    container_name: myvod-celery-worker
    command: celery -A myVOD worker -l info
    env_file:
      - ./myVOD/backend/.env
    depends_on:
      - redis
      - backend

  celery_beat:
    build:
      context: ./myVOD/backend
    container_name: myvod-celery-beat
    command: celery -A myVOD beat -l info
    env_file:
      - ./myVOD/backend/.env
    depends_on:
      - redis
      - backend
